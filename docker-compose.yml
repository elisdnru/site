services:
    traefik:
        image: traefik:3.6
        command:
            --providers.docker=true
            --providers.docker.exposedByDefault=false
            --entryPoints.http.address=:80
        ports:
            - "80:80"
        networks:
            - traefik-public
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        labels:
            - traefik.enable=true
            - traefik.docker.network=traefik-public

    site:
        image: ${REGISTRY:-localhost}/site:dev-cache
        build:
            context: ./docker
            dockerfile: development/nginx/Dockerfile
            cache_from:
                - ${REGISTRY:-localhost}/site:dev-cache
            cache_to:
                - type=inline
        networks:
            - traefik-public
            - default
        environment:
            NGINX_UPSTREAM_RESOLVER: 127.0.0.11
            NGINX_UPSTREAM_HOST: ""
        volumes:
            - ./:/app
        labels:
            - traefik.enable=true
            - traefik.docker.network=traefik-public
            - traefik.http.routers.site.rule=Host(`localhost`)
            - traefik.http.routers.site.entryPoints=http
            - traefik.http.services.site.loadBalancer.server.port=80

    site-php-fpm:
        image: ${REGISTRY:-localhost}/site-php-fpm:dev-cache
        build:
            context: ./docker
            dockerfile: development/php-fpm/Dockerfile
            args:
                GID: ${GID:-1000}
                UID: ${UID:-1000}
            cache_from:
                - ${REGISTRY:-localhost}/site-php-fpm:dev-cache
            cache_to:
                - type=inline
        environment:
            PHP_IDE_CONFIG: serverName=SITE
            APP_DEBUG: 1
            APP_ENV: dev
            APP_URL: http://localhost
            APP_CAPTCHA_CODE: 42
            COOKIE_SECRET: test
            DB_HOST: site-mysql
            DB_PORT: 3306
            DB_NAME: app
            DB_USERNAME: app
            DB_PASSWORD: db-password
            REDIS_HOST: site-redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: redis-password
            MAILER_HOST: site-mailer
            MAILER_PORT: 1025
            MAILER_USERNAME: app
            MAILER_PASSWORD: mailer-password
            MAILER_FROM_EMAIL: mail@app.test
            DEWORKER_API_URL: http://site-wiremock:8080/api.deworker.pro
            PRODUCTS_URL: http://wiremock.localhost/products.elisdn.ru
            SENTRY_DSN: ''
        volumes:
            - ./:/app

    site-php-cli:
        image: ${REGISTRY:-localhost}/site-php-cli:dev-cache
        build:
            context: ./docker
            dockerfile: development/php-cli/Dockerfile
            args:
                GID: ${GID:-1000}
                UID: ${UID:-1000}
            cache_from:
                - ${REGISTRY:-localhost}/site-php-cli:dev-cache
            cache_to:
                - type=inline
        environment:
            APP_DEBUG: 1
            APP_ENV: dev
            APP_URL: http://localhost
            COOKIE_SECRET: test
            DB_HOST: site-mysql
            DB_PORT: 3306
            DB_NAME: app
            DB_USERNAME: app
            DB_PASSWORD: db-password
            REDIS_HOST: site-redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: redis-password
            MAILER_HOST: site-mailer
            MAILER_PORT: 1025
            MAILER_USERNAME: app
            MAILER_PASSWORD: mailer-password
            MAILER_FROM_EMAIL: mail@app.test
            DEWORKER_API_URL: http://site-wiremock:8080/api.deworker.pro
            PRODUCTS_URL: http://wiremock.localhost/products.elisdn.ru
            SENTRY_DSN: ''
        volumes:
            - ./:/app
        network_mode: service:site

    site-node-watch:
        image: ${REGISTRY:-localhost}/site-node-watch:dev-cache
        build:
            context: ./docker/development/node
            args:
                GID: ${GID:-1000}
                UID: ${UID:-1000}
            cache_from:
                - ${REGISTRY:-localhost}/site-node-watch:dev-cache
            cache_to:
                - type=inline
        volumes:
            - ./:/app
        command: ["sh", "-c", "until [ -f .ready ] ; do sleep 1 ; done && exec npm run watch"]

    site-node-cli:
        image: ${REGISTRY:-localhost}/site-node-cli:dev-cache
        build:
            context: ./docker/development/node
            args:
                GID: ${GID:-1000}
                UID: ${UID:-1000}
            cache_from:
                - ${REGISTRY:-localhost}/site-node-cli:dev-cache
            cache_to:
                - type=inline
        volumes:
            - ./:/app

    site-mysql:
        image: mariadb:11
        volumes:
            - mysql:/var/lib/mysql
        environment:
            MYSQL_ROOT_PASSWORD: db-root-password
            MYSQL_USER: app
            MYSQL_PASSWORD: db-password
            MYSQL_DATABASE: app
        ports:
            - "3306:3306"

    site-mysql-backup:
        image: ${REGISTRY:-localhost}/site-mysql-backup:dev-cache
        build:
            context: ./docker/common
            dockerfile: mysql-backup/Dockerfile
            cache_from:
                - ${REGISTRY:-localhost}/site-mysql-backup:dev-cache
            cache_to:
                - type=inline
        volumes:
            - mysql-backup:/app
        environment:
            BACKUP_NAME: site-mysql
            MYSQL_HOST: site-mysql
            MYSQL_PORT: 3306
            MYSQL_USER: app
            MYSQL_PASSWORD: db-password
            MYSQL_DB: app
            AWS_ACCESS_KEY_ID: app
            AWS_SECRET_ACCESS_KEY: secret-key
            AWS_DEFAULT_REGION: region
            S3_ENDPOINT: http://site-backup-storage:9090
            S3_BUCKET: backup
        command: ["sh", "-c", "wait-for-it site-mysql:3306 -t 20 && exec backup"]

    site-upload-backup:
        image: ${REGISTRY:-localhost}/site-files-backup:dev-cache
        build:
            context: ./docker/common/files-backup
            cache_from:
                - ${REGISTRY:-localhost}/site-files-backup:dev-cache
            cache_to:
                - type=inline
        environment:
            BACKUP_NAME: site-upload
            TARGET: /upload
            AWS_ACCESS_KEY_ID: app
            AWS_SECRET_ACCESS_KEY: secret-key
            AWS_DEFAULT_REGION: region
            S3_ENDPOINT: http://site-backup-storage:9090
            S3_BUCKET: backup
        volumes:
            - ./public/upload:/upload:ro
            - upload-backup:/app

    site-redis:
        image: redis:8.6-alpine3.23
        volumes:
            - redis:/data
        command:
            - 'redis-server'
            - '--maxmemory 32mb'
            - '--maxmemory-policy allkeys-lru'
            - '--requirepass redis-password'

    site-mailer:
        image: axllent/mailpit:v1.26
        environment:
            MP_SMTP_AUTH_ACCEPT_ANY: 1
            MP_SMTP_AUTH_ALLOW_INSECURE: 1
        networks:
            - traefik-public
            - default
        labels:
            - traefik.enable=true
            - traefik.docker.network=traefik-public
            - traefik.http.routers.site-mailer.rule=Host(`mailer.localhost`)
            - traefik.http.routers.site-mailer.entryPoints=http
            - traefik.http.services.site-mailer.loadBalancer.server.port=8025

    site-backup-storage:
        image: adobe/s3mock:4.11.0
        environment:
            COM_ADOBE_TESTING_S3MOCK_STORE_INITIAL_BUCKETS: backup
            COM_ADOBE_TESTING_S3MOCK_STORE_ROOT: data
        volumes:
            - backup-storage:/data

    site-wiremock:
        image: wiremock/wiremock:3.13.2-alpine
        networks:
            - traefik-public
            - default
        volumes:
            - ./wiremock:/home/wiremock
        command:
            - '--global-response-templating'
            - '--verbose'
        labels:
            - traefik.enable=true
            - traefik.docker.network=traefik-public
            - traefik.http.routers.site-wiremock.rule=Host(`wiremock.localhost`)
            - traefik.http.routers.site-wiremock.entryPoints=http
            - traefik.http.services.site-wiremock.loadBalancer.server.port=8080

volumes:
    upload-backup:
    mysql:
    mysql-backup:
    redis:
    backup-storage:

networks:
    traefik-public:
        name: traefik-public
