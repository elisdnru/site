services:
    traefik:
        image: traefik:3.6
        command:
            --providers.docker=true
            --providers.docker.exposedByDefault=false
            --entryPoints.http.address=:80
        networks:
            - traefik-public
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        labels:
            - traefik.enable=true
            - traefik.docker.network=traefik-public

    site:
        image: ${REGISTRY}/site:${IMAGE_TAG}
        networks:
            - traefik-public
            - default
        environment:
            NGINX_UPSTREAM_RESOLVER: 127.0.0.11
            NGINX_UPSTREAM_HOST: ""
        labels:
            - traefik.enable=true
            - traefik.docker.network=traefik-public
            - traefik.http.routers.site.rule=Host(`localhost`)
            - traefik.http.routers.site.entryPoints=http
            - traefik.http.services.site.loadBalancer.server.port=80

    site-php-fpm:
        image: ${REGISTRY}/site-php-fpm:${IMAGE_TAG}
        environment:
            PHP_IDE_CONFIG: serverName=SITE
            APP_DEBUG: 0
            APP_ENV: prod
            APP_URL: http://localhost
            APP_CAPTCHA_CODE: 42
            COOKIE_SECRET: test
            DB_HOST: site-mysql
            DB_PORT: 3306
            DB_NAME: app
            DB_USERNAME: app
            DB_PASSWORD: db-password
            REDIS_HOST: site-redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: redis-password
            MAILER_HOST: site-mailer
            MAILER_PORT: 1025
            MAILER_USERNAME: app
            MAILER_PASSWORD: mailer-password
            MAILER_FROM_EMAIL: mail@app.test
            DEWORKER_API_URL: http://site-wiremock:8080/api.deworker.pro
            PRODUCTS_URL: http://wiremock.localhost/products.elisdn.ru
            SENTRY_DSN: ''

    site-php-cli:
        image: ${REGISTRY}/site-php-cli:${IMAGE_TAG}
        environment:
            APP_DEBUG: 0
            APP_ENV: prod
            APP_URL: http://localhost
            COOKIE_SECRET: test
            DB_HOST: site-mysql
            DB_PORT: 3306
            DB_NAME: app
            DB_USERNAME: app
            DB_PASSWORD: db-password
            REDIS_HOST: site-redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: redis-password
            MAILER_HOST: site-mailer
            MAILER_PORT: 1025
            MAILER_USERNAME: app
            MAILER_PASSWORD: mailer-password
            MAILER_FROM_EMAIL: mail@app.test
            DEWORKER_API_URL: http://site-wiremock:8080/api.deworker.pro
            PRODUCTS_URL: http://wiremock.localhost/products.elisdn.ru
            SENTRY_DSN: ''
        network_mode: service:site

    testing-site-php-cli:
        image: ${REGISTRY}/site-testing-php-cli:${IMAGE_TAG}
        environment:
            APP_DEBUG: 1
            APP_ENV: dev
            APP_URL: http://localhost
            COOKIE_SECRET: test
            DB_HOST: site-mysql
            DB_PORT: 3306
            DB_NAME: app
            DB_USERNAME: app
            DB_PASSWORD: db-password
            REDIS_HOST: site-redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: redis-password
            MAILER_HOST: site-mailer
            MAILER_PORT: 1025
            MAILER_USERNAME: app
            MAILER_PASSWORD: mailer-password
            MAILER_FROM_EMAIL: mail@app.test
            DEWORKER_API_URL: http://site-wiremock:8080/api.deworker.pro
            PRODUCTS_URL: http://wiremock.localhost/products.elisdn.ru
            SENTRY_DSN: ''
        volumes:
            - ./tests/_output:/app/tests/_output
        network_mode: service:site

    site-mysql:
        image: mariadb:11
        volumes:
            - mysql:/var/lib/mysql
        environment:
            MYSQL_ROOT_PASSWORD: db-root-password
            MYSQL_USER: app
            MYSQL_PASSWORD: db-password
            MYSQL_DATABASE: app

    site-redis:
        image: redis:8.6-alpine3.23
        volumes:
            - redis:/data
        command:
            - 'redis-server'
            - '--maxmemory 32mb'
            - '--maxmemory-policy allkeys-lru'
            - '--requirepass redis-password'

    site-mailer:
        image: axllent/mailpit:v1.26
        environment:
            MP_SMTP_AUTH_ACCEPT_ANY: 1
            MP_SMTP_AUTH_ALLOW_INSECURE: 1
        networks:
            - traefik-public
            - default
        labels:
            - traefik.enable=true
            - traefik.docker.network=traefik-public
            - traefik.http.routers.site-mailer.rule=Host(`mailer.localhost`)
            - traefik.http.routers.site-mailer.entryPoints=http
            - traefik.http.services.site-mailer.loadBalancer.server.port=8025

    site-wiremock:
        image: wiremock/wiremock:3.13.2-alpine
        networks:
            - traefik-public
            - default
        volumes:
            - ./wiremock:/home/wiremock
        command:
            - '--global-response-templating'
            - '--verbose'
        labels:
            - traefik.enable=true
            - traefik.docker.network=traefik-public
            - traefik.http.routers.site-wiremock.rule=Host(`wiremock.localhost`)
            - traefik.http.routers.site-wiremock.entryPoints=http
            - traefik.http.services.site-wiremock.loadBalancer.server.port=8080

volumes:
    mysql:
    redis:

networks:
    traefik-public:
        name: traefik-public
